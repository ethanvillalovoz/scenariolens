<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=demo/" />
    <title>ScenarioLens</title>
    <link rel="canonical" href="demo/" />
    <style>
      :root {
        color-scheme: light;
        --ink: #0f172a;
        --muted: #64748b;
        --line: #dbe4ef;
        --surface: #ffffff;
        --bg: #f6f8fb;
        --blue: #1d4ed8;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        color: var(--ink);
        background: var(--bg);
      }

      main {
        width: min(92vw, 560px);
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--surface);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      a {
        color: var(--blue);
        font-weight: 700;
      }
    </style>
    <script>
      window.location.replace("demo/");
    </script>
  </head>
  <body>
    <main>
      <h1>ScenarioLens</h1>
      <p>Opening the <a href="demo/">Scenario Explorer</a>.</p>
    </main>
  </body>
</html>
