name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover

      - name: Check static demo JavaScript
        run: node --check docs/demo/app.js

      - name: Smoke test scenario export and report
        env:
          PYTHONPATH: src
        run: |
          python -m scenariolens.cli export-synthetic --output /tmp/scenariolens-synthetic.json
          python -m scenariolens.cli report --input /tmp/scenariolens-synthetic.json --format markdown --limit 3

      - name: Smoke test CSV ingestion
        env:
          PYTHONPATH: src
        run: |
          cat > /tmp/scenariolens-tracks.csv <<'CSV'
          scenario_id,agent_id,agent_type,t,x,y,vx,vy,ego_track_id,tags
          ci_case,ego,vehicle,0,0,0,4,0,ego,merge_conflict
          ci_case,ego,vehicle,1,4,0,4,0,ego,merge_conflict
          ci_case,ped_1,pedestrian,0,3,-2,0,1,ego,pedestrian_crossing
          ci_case,ped_1,pedestrian,1,3,-1,0,1,ego,pedestrian_crossing
          CSV
          python -m scenariolens.cli ingest-csv --input /tmp/scenariolens-tracks.csv --output /tmp/scenariolens-csv.json
          python -m scenariolens.cli report --input /tmp/scenariolens-csv.json --format json --limit 1

      - name: Smoke test normalized Waymo Motion ingestion
        env:
          PYTHONPATH: src
        run: |
          python -m scenariolens.cli ingest-waymo-motion --format normalized-csv --input docs/examples/waymo_motion_normalized.csv --output /tmp/scenariolens-waymo-normalized.json --max-scenarios 1
          python -m scenariolens.cli report --input /tmp/scenariolens-waymo-normalized.json --format json --limit 1

      - name: Smoke test SVG rendering
        env:
          PYTHONPATH: src
        run: |
          python -m scenariolens.cli render --input /tmp/scenariolens-synthetic.json --top 3 --output-dir /tmp/scenariolens-gallery
          test -f /tmp/scenariolens-gallery/synthetic_dense_intersection_vru.svg
