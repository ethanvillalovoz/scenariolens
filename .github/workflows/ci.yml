name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Check CLI entrypoint
        run: scenariolens --help

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover

      - name: Check static demo JavaScript
        run: node --check docs/demo/app.js

      - name: Check dashboard JSON
        run: python -m json.tool docs/demo/scenarios.json

      - name: Smoke test scenario export and report
        run: |
          scenariolens export-synthetic --output /tmp/scenariolens-synthetic.json
          scenariolens report --input /tmp/scenariolens-synthetic.json --format markdown --limit 3
          scenariolens baseline-compare --input /tmp/scenariolens-synthetic.json --format json --limit 3
          scenariolens baseline-ablation --input /tmp/scenariolens-synthetic.json --format json
          scenariolens baseline-compare-study --input /tmp/scenariolens-synthetic.json --format scenariolens-json --output-dir /tmp/scenariolens-baseline-study --max-scenarios 11 --top 6
          scenariolens baseline-debug --study-manifest /tmp/scenariolens-baseline-study/manifest.json --output-dir /tmp/scenariolens-debug --case-count 2
          scenariolens replay-candidates --debug-manifest /tmp/scenariolens-debug/manifest.json --output-dir /tmp/scenariolens-replay-candidates
          scenariolens replay-prototype --candidate-manifest /tmp/scenariolens-replay-candidates/manifest.json --output-dir /tmp/scenariolens-replay-prototype --top 2

      - name: Smoke test CSV ingestion
        run: |
          cat > /tmp/scenariolens-tracks.csv <<'CSV'
          scenario_id,agent_id,agent_type,t,x,y,vx,vy,ego_track_id,tags
          ci_case,ego,vehicle,0,0,0,4,0,ego,merge_conflict
          ci_case,ego,vehicle,1,4,0,4,0,ego,merge_conflict
          ci_case,ped_1,pedestrian,0,3,-2,0,1,ego,pedestrian_crossing
          ci_case,ped_1,pedestrian,1,3,-1,0,1,ego,pedestrian_crossing
          CSV
          scenariolens ingest-csv --input /tmp/scenariolens-tracks.csv --output /tmp/scenariolens-csv.json
          scenariolens report --input /tmp/scenariolens-csv.json --format json --limit 1

      - name: Smoke test normalized Waymo Motion ingestion
        run: |
          scenariolens ingest-waymo-motion --format normalized-csv --input docs/examples/waymo_motion_normalized.csv --output /tmp/scenariolens-waymo-normalized.json --max-scenarios 1
          scenariolens report --input /tmp/scenariolens-waymo-normalized.json --format json --limit 1

      - name: Smoke test SVG rendering
        run: |
          scenariolens render --input /tmp/scenariolens-synthetic.json --top 3 --output-dir /tmp/scenariolens-gallery
          test -f /tmp/scenariolens-gallery/synthetic_dense_intersection_vru.svg
